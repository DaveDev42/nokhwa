name: V4L Loopback Device Tests

# Linux-only hardware-gated tests using v4l2loopback to create a virtual
# /dev/video0 fed by an ffmpeg test pattern. Exercises the device-test
# suite (query, nokhwa::open dispatch, frame streaming, controls, runner)
# on every PR without needing a physical camera.
#
# `continue-on-error: true` — if the runner kernel/DKMS combination
# breaks v4l2loopback on a given day, this job surfaces the failure but
# does not block merges. See TODO.md / PR description for follow-up.

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  v4l-loopback:
    name: V4L loopback device tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Probe kernel version
        # `awalsh128/cache-apt-pkgs-action` needs a deterministic
        # cache key. Pin the linux-modules-extra package name (which
        # varies with the runner's kernel) into a step output so the
        # cache action sees a stable-for-this-kernel key.
        id: kernel
        run: |
          KERNEL="$(uname -r)"
          echo "version=$KERNEL" >> "$GITHUB_OUTPUT"
          echo "modules-base=linux-modules-$KERNEL" >> "$GITHUB_OUTPUT"
          echo "modules=linux-modules-extra-$KERNEL" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies (cached)
        # Caches the apt .deb archives + installed files under
        # ``/var/cache/apt/archives`` keyed on kernel version. Cold
        # runs on a new kernel still do the full apt-get dance and
        # pay the 50MB linux-modules-extra cost; every other run
        # hits the cache and installs in ~10s instead of ~90s.
        #
        # linux-headers-azure is included so DKMS can compile
        # v4l2loopback.ko against the running kernel on cache-hit
        # runs (see "Ensure v4l2loopback DKMS module is built" step).
        #
        # ffmpeg is intentionally NOT cached here: it transitively
        # depends on libblas3/libgfortran5/libavfilter etc., and
        # awalsh128/cache-apt-pkgs-action restores only the listed
        # package binaries, not their unlisted transitive shared-lib
        # deps. On cache hit ffmpeg ends up missing libblas.so.3 at
        # runtime. Install ffmpeg fresh in the next step instead so
        # apt resolves the full dependency closure.
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            ${{ steps.kernel.outputs.modules-base }}
            ${{ steps.kernel.outputs.modules }}
            linux-headers-azure
            libv4l-dev
            v4l-utils
            v4l2loopback-dkms
          version: kernel4-${{ steps.kernel.outputs.version }}

      - name: Install ffmpeg (uncached, needs full dep closure)
        # Intentionally outside the apt cache action: ffmpeg's
        # transitive shared-lib dependencies (libblas3, libgfortran5,
        # libavfilter etc.) are not enumerated in the cache action's
        # package list and are not restored on cache hit, leaving
        # ffmpeg unable to load libblas.so.3 at runtime. apt-get
        # install resolves the full closure correctly. ~5-10s.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Ensure v4l2loopback DKMS module is built
        # awalsh128/cache-apt-pkgs-action defaults to
        # execute_install_scripts: false. On cache hit the dpkg DB and
        # /usr/src/v4l2loopback-<ver>/ are restored but the
        # v4l2loopback-dkms postinst (which runs `dkms install`) never
        # re-executes, so /lib/modules/<kernel>/updates/dkms/v4l2loopback.ko
        # for the *current* kernel is missing. Call `dkms install`
        # explicitly with the current kernel as target. Idempotent: a
        # no-op (~0s) when the postinst already ran on a cold install,
        # a ~10–15s compile on cache-hit runs.
        run: |
          KERNEL="$(uname -r)"
          if sudo dkms status v4l2loopback/0.12.7 -k "$KERNEL" 2>/dev/null \
              | grep -q "installed"; then
            echo "v4l2loopback/0.12.7 already installed for $KERNEL — skipping dkms install"
          else
            sudo dkms install v4l2loopback/0.12.7 -k "$KERNEL"
          fi

      - name: Rebuild kernel module dependency index
        # awalsh128/cache-apt-pkgs-action skips package postinst scripts
        # by default (execute_install_scripts: false). The linux-modules*
        # postinst normally runs `depmod -a` to regenerate
        # /lib/modules/<kernel>/modules.dep. Without it, modprobe
        # reports "not found" by name even when the .ko file is on
        # disk. The `dkms install` step above also runs depmod
        # internally, but an explicit call here covers the
        # linux-modules* .ko index regardless of ordering and is
        # idempotent (~500ms).
        run: sudo depmod -a

      - name: Load v4l2loopback module
        run: |
          # v4l2loopback depends on symbols from videodev (v4l2_fh_exit,
          # video_device_*). videodev.ko ships in linux-modules-<kernel>
          # (the base package), not linux-modules-extra. On ubuntu-latest
          # it is not autoloaded, so insmod fails with "Unknown symbol".
          # Ensure the prerequisite modules are loaded first.
          sudo modprobe videodev
          # exclusive_caps=1 makes the node advertise either capture or
          # output caps depending on which side opens first — required
          # so `nokhwa` sees it as a plain capture device rather than a
          # device that claims both roles simultaneously.
          sudo modprobe v4l2loopback \
            devices=1 \
            video_nr=0 \
            card_label="nokhwa-ci-loopback" \
            exclusive_caps=1
          # Wait for udev to create the device node.
          for _ in $(seq 1 10); do
            if [ -e /dev/video0 ]; then
              break
            fi
            sleep 0.5
          done
          if [ ! -e /dev/video0 ]; then
            echo "/dev/video0 never appeared after modprobe v4l2loopback"
            sudo dmesg | tail -40
            exit 1
          fi
          # The loopback device node is root-only by default; hand it to
          # the unprivileged runner user so ffmpeg + cargo test can open
          # it without sudo. Use $(id -un) rather than $USER for
          # robustness against runner-image env changes.
          sudo chown "$(id -un)" /dev/video0
          ls -l /dev/video0
          v4l2-ctl --list-devices

      - name: Start ffmpeg synthetic stream
        run: |
          # Feed a 640x480 YUYV test pattern at 30fps into /dev/video0.
          # `-nostdin` disowns the TTY so the backgrounded process does
          # not hold the step open. Cleanup uses `pkill -f` rather than a
          # PID file because tracking the exact ffmpeg pid across job
          # steps via /tmp is brittle and not needed here.
          ffmpeg -nostdin -loglevel warning \
            -f lavfi -i "testsrc2=size=640x480:rate=30" \
            -pix_fmt yuyv422 \
            -f v4l2 /dev/video0 \
            > /tmp/ffmpeg.log 2>&1 &
          disown
          # Wait until v4l2-ctl reports a driver attached to the device.
          ready=0
          for i in $(seq 1 20); do
            if v4l2-ctl -d /dev/video0 --get-fmt-video 2>/dev/null | grep -q "Width/Height"; then
              echo "ffmpeg producer ready after ${i} polls"
              ready=1
              break
            fi
            sleep 0.5
          done
          if [ "$ready" -ne 1 ]; then
            echo "ffmpeg did not become ready; dumping log:"
            cat /tmp/ffmpeg.log || true
            exit 1
          fi
          v4l2-ctl -d /dev/video0 --get-fmt-video

      - name: Build device tests
        run: cargo test --features input-v4l,device-test,runner --test device_tests --no-run

      - name: Run device tests
        run: |
          cargo test --features input-v4l,device-test,runner --test device_tests \
            -- --test-threads=1 --nocapture

      - name: V4L hotplug smoke test
        # Runs `hotplug_probe` against a dynamically changing v4l2loopback
        # device set and asserts the probe observed both a `Connected`
        # and a `Disconnected` event end-to-end.
        #
        # We drive change via `modprobe -r` + `modprobe` with a different
        # `devices=` count rather than `v4l2loopback-ctl add/delete`
        # because the Ubuntu-packaged `v4l2loopback-utils` ships an older
        # control binary whose only subcommands are `set-fps` /
        # `set-timeout-image` / `set-caps` — `add` / `delete` are not
        # available. The ffmpeg producer from earlier steps is already
        # done with /dev/video0 at this point; we kill it first so
        # `modprobe -r` isn't blocked by an open handle.
        #
        # Every failure mode is a hard `exit 1` (no silent skips): if
        # anything regresses we want the step visibly red. Job-level
        # `continue-on-error: true` still prevents a red hotplug step
        # from blocking merges the same way the surrounding steps
        # handle kernel/DKMS flakiness.
        continue-on-error: true
        run: |
          set -e
          # Stop ffmpeg (already served its purpose) so modprobe -r can
          # succeed without EBUSY on /dev/video0.
          pkill -f "ffmpeg.*testsrc2" 2>/dev/null || true
          sleep 1
          # Reload with two devices so the probe's seed snapshot contains
          # both; we'll then remove one to generate a Disconnected event
          # and re-add it to generate Connected.
          sudo modprobe -r v4l2loopback
          sudo modprobe v4l2loopback devices=2 video_nr=0,1 \
            card_label="nokhwa-ci-hotplug-0,nokhwa-ci-hotplug-1" \
            exclusive_caps=1
          for _ in $(seq 1 10); do
            [ -e /dev/video0 ] && [ -e /dev/video1 ] && break
            sleep 0.5
          done
          if [ ! -e /dev/video1 ]; then
            # Hard-fail rather than silent-skip: if devices=2 reload
            # doesn't produce /dev/video1 we want the step red so the
            # regression is visible. Job-level `continue-on-error: true`
            # still prevents this from blocking merges.
            echo "FAIL: v4l2loopback devices=2 reload did not expose /dev/video1"
            sudo dmesg | tail -40 || true
            exit 1
          fi
          sudo chown "$(id -un)" /dev/video0 /dev/video1

          cargo build --features input-v4l --example hotplug_probe
          (target/debug/examples/hotplug_probe \
              > /tmp/hotplug_probe.log 2>&1) &
          PROBE_PID=$!
          sleep 2  # seed snapshot (both devices present)

          # Remove /dev/video1 by reloading with a single device. The
          # probe should observe this as Disconnected within ~500ms.
          sudo modprobe -r v4l2loopback
          sudo modprobe v4l2loopback devices=1 video_nr=0 \
            card_label="nokhwa-ci-hotplug-0" exclusive_caps=1
          sleep 2

          # Re-add /dev/video1 to generate a Connected event.
          sudo modprobe -r v4l2loopback
          sudo modprobe v4l2loopback devices=2 video_nr=0,1 \
            card_label="nokhwa-ci-hotplug-0,nokhwa-ci-hotplug-1" \
            exclusive_caps=1
          sleep 2

          # Probe self-exits at 15s; `wait` returns immediately if it's
          # already gone.
          wait "$PROBE_PID" 2>/dev/null || true
          echo "=== hotplug probe log ==="
          cat /tmp/hotplug_probe.log
          grep -q "Connected(" /tmp/hotplug_probe.log || {
            echo "FAIL: no Connected event observed"
            exit 1
          }
          grep -q "Disconnected(" /tmp/hotplug_probe.log || {
            echo "FAIL: no Disconnected event observed"
            exit 1
          }

      - name: Device status (post-test)
        if: always()
        # Surface the device the tests ran against — a silent fallback
        # to some other /dev/videoN would be visible here. Runs even on
        # test failure so the diagnostic isn't lost when it matters most.
        run: v4l2-ctl -d /dev/video0 --log-status || true

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "=== ffmpeg log ==="
          cat /tmp/ffmpeg.log || true
          echo "=== v4l2-ctl --list-devices ==="
          v4l2-ctl --list-devices || true
          echo "=== v4l2-ctl --all ==="
          v4l2-ctl -d /dev/video0 --all || true
          echo "=== dmesg (v4l2loopback) ==="
          sudo dmesg | grep -i v4l2 || true

      - name: Cleanup
        if: always()
        run: |
          # Match by command line — no PID file is kept (see "Start ffmpeg
          # synthetic stream"). Stop ffmpeg before unloading the module
          # so the producer doesn't error noisily on EBADF.
          pkill -f "ffmpeg.*testsrc2" 2>/dev/null || true
          sudo modprobe -r v4l2loopback || true
          # Symmetric with the load step. modprobe -r is a no-op if the
          # module is still in use elsewhere on the runner image, hence
          # the `|| true`.
          sudo modprobe -r videodev || true
