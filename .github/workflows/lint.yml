name: Lint

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy-linux:
    name: Clippy (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install GStreamer dev libs
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      # `--all-targets` covers libs, tests, examples, and benches —
      # without it, clippy never sees `#[cfg(test)]` modules. The
      # `--features input-v4l,input-gstreamer` set forces the gstreamer
      # bindings crate to compile its real backend (gated behind the
      # bindings crate's `backend` feature, which the top-level
      # `input-gstreamer` feature pulls in).
      - name: Clippy --workspace --all-targets
        run: cargo clippy --workspace --features input-v4l,input-gstreamer --all-targets -- -D warnings

  clippy-windows:
    name: Clippy (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy --workspace --all-targets
        run: cargo clippy --workspace --features input-msmf --all-targets -- -D warnings

  clippy-macos:
    name: Clippy (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy --workspace --all-targets
        run: cargo clippy --workspace --features input-avfoundation --all-targets -- -D warnings
