name: Lint

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy-linux:
    name: Clippy (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install GStreamer dev libs
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - name: Clippy nokhwa-core
        run: cargo clippy -p nokhwa-core -- -D warnings
      - name: Clippy nokhwa-bindings-linux-v4l
        run: cargo clippy -p nokhwa-bindings-linux-v4l -- -D warnings
      - name: Clippy nokhwa-bindings-gstreamer
        run: cargo clippy -p nokhwa-bindings-gstreamer -- -D warnings
      - name: Clippy nokhwa (input-v4l)
        run: cargo clippy --features input-v4l -- -D warnings

  clippy-windows:
    name: Clippy (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy nokhwa-bindings-windows-msmf
        run: cargo clippy -p nokhwa-bindings-windows-msmf -- -D warnings
      - name: Clippy nokhwa (input-msmf)
        run: cargo clippy --features input-msmf -- -D warnings

  clippy-macos:
    name: Clippy (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy nokhwa-bindings-macos-avfoundation
        run: cargo clippy -p nokhwa-bindings-macos-avfoundation -- -D warnings
      - name: Clippy nokhwa (input-avfoundation)
        run: cargo clippy --features input-avfoundation -- -D warnings
