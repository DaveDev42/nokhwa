name: Lint

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Exclude input-opencv from docs-only to avoid OpenCV system dep in CI.
      # input-native + output features cover all platform code via cfg guards.
      # Allow known pre-existing pedantic lints from legacy code while
      # keeping correctness and most style lints enforced.
      - run: >-
          cargo clippy --features input-native,output-wgpu,output-threaded,serialize,docs-nolink --
          -D warnings
          -A clippy::similar_names
          -A clippy::struct_field_names
          -A clippy::needless_for_each
          -A clippy::doc_markdown
          -A clippy::missing_errors_doc
          -A clippy::must_use_candidate
          -A clippy::cast_lossless
          -A clippy::implicit_clone
          -A clippy::unnecessary_trailing_comma
          -A clippy::empty_line_after_outer_attr
          -A clippy::manual_is_multiple_of
          -A clippy::derivable_impls
          -A clippy::unnecessary_sort_by
