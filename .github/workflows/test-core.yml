name: Test Core & Features

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-core:
    name: Core unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p nokhwa-core

  # Verifies output feature deps resolve correctly.
  # input-v4l satisfies the compile_error! guard that requires an input backend.
  check-features:
    name: Feature check (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - runner
          - output-wgpu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --features input-v4l,${{ matrix.features }}

  # Verifies the cross-platform OpenCV backend still compiles. Installs
  # OpenCV from apt so the `opencv` crate's clang-runtime bindgen pass
  # can find the system headers.
  check-opencv:
    name: Feature check (input-opencv)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install OpenCV
        # `libopencv-dev` is needed for `OpenCVConfig.cmake` / `opencv4.pc`
        # (per-module `libopencv-*-dev` don't ship those). Use
        # `--no-install-recommends` to skip Recommends that pull ~2GB of
        # ROCm/HIP and GStreamer extras from slow Azure mirrors.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libopencv-dev \
            libclang-dev \
            pkg-config
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --features input-opencv

  # Verifies the cross-platform GStreamer backend (session 1: enumeration
  # only) compiles on the canonical Linux path. gstreamer-rs links against
  # the system GStreamer install at build time.
  check-gstreamer:
    name: Feature check (input-gstreamer)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install GStreamer
        # `libgstreamer1.0-dev` ships the pkg-config files for the core
        # sys crate. `libgstreamer-plugins-base1.0-dev` supplies the
        # `gstreamer-app-1.0.pc` + `gstreamer-video-1.0.pc` that
        # `gstreamer-app-sys` / `gstreamer-video-sys` need (session-2
        # streaming). `gstreamer1.0-plugins-base` provides the
        # `videoconvert` element our pipeline relies on. Skip Recommends
        # to avoid pulling in the
        # full plugin set.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            pkg-config
      - uses: Swatinem/rust-cache@v2
      # Check `input-gstreamer` standalone — not paired with `input-v4l` —
      # so `-D warnings` only applies to the gstreamer crate and the
      # top-level crate. Pre-existing warnings in the v4l bindings crate
      # (e.g. an unused `Stream` import) are intentionally out of scope
      # for this job; they surface under the `check-features` matrix
      # which does not set `-D warnings`.
      - run: cargo check --features input-gstreamer
      - run: cargo test -p nokhwa-bindings-gstreamer --features backend
