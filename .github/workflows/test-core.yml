name: Test Core & Features

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-core:
    name: Core unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p nokhwa-core

  # Verifies output feature deps resolve correctly.
  # input-v4l satisfies the compile_error! guard that requires an input backend.
  check-features:
    name: Feature check (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - runner
          - output-wgpu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --features input-v4l,${{ matrix.features }}

  # Verifies the cross-platform GStreamer backend (session 1: enumeration
  # only) compiles on the canonical Linux path. gstreamer-rs links against
  # the system GStreamer install at build time.
  check-gstreamer:
    name: Feature check (input-gstreamer)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install GStreamer
        # `libgstreamer1.0-dev` ships the pkg-config files for the core
        # sys crate. `libgstreamer-plugins-base1.0-dev` supplies the
        # `gstreamer-app-1.0.pc` + `gstreamer-video-1.0.pc` that
        # `gstreamer-app-sys` / `gstreamer-video-sys` need (session-2
        # streaming). `gstreamer1.0-plugins-base` provides the
        # `videoconvert` element our pipeline relies on. Skip Recommends
        # to avoid pulling in the
        # full plugin set.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            pkg-config
      - uses: Swatinem/rust-cache@v2
      # Check `input-gstreamer` standalone — not paired with `input-v4l` —
      # so `-D warnings` only applies to the gstreamer crate and the
      # top-level crate. Pre-existing warnings in the v4l bindings crate
      # (e.g. an unused `Stream` import) are intentionally out of scope
      # for this job; they surface under the `check-features` matrix
      # which does not set `-D warnings`.
      - run: cargo check --features input-gstreamer
      - run: cargo test -p nokhwa-bindings-gstreamer --features backend

  # Verifies the GStreamer backend also compiles on Windows. The
  # install is huge (~500 MB from gstreamer.freedesktop.org) so we
  # cache it aggressively — first cold run costs ~5 min, subsequent
  # PRs hit the cache and take <30 s. ``continue-on-error: true``
  # keeps a mirror-flake during install from blocking merges; the
  # separate ``Build (windows)`` job already exercises the top-level
  # crate with MSMF.
  check-gstreamer-windows:
    name: Feature check (input-gstreamer, windows)
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true
    env:
      RUSTFLAGS: "-D warnings"
      # Match the per-user install path the GStreamer MSVC installer
      # uses by default so the cache key stays stable across runs.
      GST_ROOT: C:\gstreamer\1.0\msvc_x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Cache GStreamer SDK
        id: cache-gstreamer-win
        uses: actions/cache@v4
        with:
          path: ${{ env.GST_ROOT }}
          # Bump the version segment if we need a newer SDK for a
          # specific plugin.
          key: gstreamer-msvc-1.26.0
      - name: Install GStreamer (MSVC)
        if: steps.cache-gstreamer-win.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # CLAUDE.md preference is ``winget > choco > direct MSI``,
          # but neither covers what we need here:
          # - chocolatey's ``gstreamer`` pins to 0.10.x (2013) — unusable
          # - ``winget install gstreamerproject.gstreamer`` gives runtime
          #   only; it does NOT ship the ``-devel`` MSI that has the
          #   ``.pc`` files pkg-config needs to build the crate
          # So we download both MSIs directly from gstreamer.freedesktop.org
          # and run them with ``msiexec /quiet ADDLOCAL=ALL`` to get the
          # "Complete" variant (runtime + headers + full plugin set).
          # ``-UseBasicParsing`` avoids loading IE's script-host on bare
          # GH runners.
          $ver = '1.26.0'
          $urlRuntime = "https://gstreamer.freedesktop.org/data/pkg/windows/$ver/msvc/gstreamer-1.0-msvc-x86_64-$ver.msi"
          $urlDevel   = "https://gstreamer.freedesktop.org/data/pkg/windows/$ver/msvc/gstreamer-1.0-devel-msvc-x86_64-$ver.msi"
          $tmpR = "$env:RUNNER_TEMP\gstreamer-runtime.msi"
          $tmpD = "$env:RUNNER_TEMP\gstreamer-devel.msi"
          # gstreamer.freedesktop.org serves its downloads through a
          # ``go-away`` bot-challenge page; Invoke-WebRequest's default
          # User-Agent gets blocked with "Protected by go-away". Set a
          # real browser UA so the CDN serves the MSI directly.
          $ua = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
          Write-Output "Downloading $urlRuntime"
          Invoke-WebRequest -Uri $urlRuntime -OutFile $tmpR -UseBasicParsing -UserAgent $ua
          Write-Output "Downloading $urlDevel"
          Invoke-WebRequest -Uri $urlDevel -OutFile $tmpD -UseBasicParsing -UserAgent $ua
          # Verify the downloads are actually MSIs (not HTML challenge
          # pages) — "go-away" will serve a 200 OK with HTML content
          # if the UA isn't allow-listed, which would otherwise slip
          # through Invoke-WebRequest unnoticed.
          foreach ($p in @($tmpR, $tmpD)) {
            $size = (Get-Item $p).Length
            if ($size -lt 10MB) {
              Write-Error "Downloaded $p is only $size bytes — likely a go-away challenge page, not the MSI"
              Get-Content $p -Raw -TotalCount 500
              exit 1
            }
          }
          # ADDLOCAL=ALL forces the "Complete" install variant; the
          # default is "Typical" which skips the plugins-bad + libav
          # decoders our tests require.
          Write-Output "Installing runtime MSI"
          Start-Process msiexec.exe -ArgumentList "/i `"$tmpR`" /quiet /norestart ADDLOCAL=ALL" -Wait -NoNewWindow
          Write-Output "Installing devel MSI"
          Start-Process msiexec.exe -ArgumentList "/i `"$tmpD`" /quiet /norestart ADDLOCAL=ALL" -Wait -NoNewWindow
          # Verify the install produced the expected binaries + pkgcfg
          # before we burn a cache entry on an incomplete tree.
          if (-not (Test-Path "${env:GST_ROOT}\bin\gst-launch-1.0.exe")) {
            Write-Error "gst-launch-1.0.exe missing after install — MSI install did not land in expected path"
            exit 1
          }
          if (-not (Test-Path "${env:GST_ROOT}\lib\pkgconfig\gstreamer-1.0.pc")) {
            Write-Error "gstreamer-1.0.pc missing — devel MSI did not install"
            exit 1
          }
      - name: Expose GStreamer to cargo
        shell: pwsh
        run: |
          $gstBin  = "${env:GST_ROOT}\bin"
          $gstPkg  = "${env:GST_ROOT}\lib\pkgconfig"
          Add-Content -Path $env:GITHUB_PATH -Value $gstBin
          Add-Content -Path $env:GITHUB_ENV  -Value "PKG_CONFIG_PATH=$gstPkg"
          Write-Output "GStreamer bin   : $gstBin"
          Write-Output "GStreamer pkgcfg: $gstPkg"
          if (-not (Test-Path "$gstBin\gst-launch-1.0.exe")) {
            Write-Error "GStreamer install did not produce gst-launch-1.0.exe — cache or installer broken"
            exit 1
          }
      - run: cargo check --features input-gstreamer
      - run: cargo test -p nokhwa-bindings-gstreamer --features backend
