name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-core:
    name: Core unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo test -p nokhwa-core

  check-features:
    name: Feature check (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - output-threaded
          - output-wgpu
          - decoding
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo check --features ${{ matrix.features }}
