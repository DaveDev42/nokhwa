name: Test Core & Features

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-core:
    name: Core unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p nokhwa-core
      # `wgpu-types` gates the GPU output module (`src/wgpu.rs`) behind
      # a `#[cfg(...)]`. Default-feature `cargo test` skips it entirely,
      # so the `raw_texture_layout` arithmetic ships untested without
      # this second invocation. The tests are pure CPU arithmetic; no
      # GPU/surface is created, so ubuntu-latest is sufficient.
      - run: cargo test -p nokhwa-core --features wgpu-types
      # `testing` gates the mock helpers (`src/testing.rs`) behind a
      # `#[cfg(...)]`. The root crate's dev-dependencies activate it,
      # but `cargo test -p nokhwa-core` above does not, so the unit
      # tests covering `mock_frame` / `mock_info` ship untested
      # without this third invocation.
      - run: cargo test -p nokhwa-core --features testing
      # The root `nokhwa` crate's headless unit + integration tests
      # (`src/init.rs`, `src/query.rs`, `src/runner.rs`,
      # `tests/session.rs`, `tests/format_tests.rs`, `tests/runner.rs`)
      # only run when `cargo test -p nokhwa` is invoked — they have no
      # other entry point in the matrix. The root crate has a
      # `compile_error!` requiring at least one `input-*` feature, so
      # we pick `input-v4l` (the canonical Linux backend) plus
      # `runner` to compile-in the runner integration tests in
      # `tests/runner.rs`. None of these tests touch real hardware —
      # `tests/device_tests.rs` is gated on `device-test` and stays
      # disabled here. Without this step, ~65 tests covering
      # capability dispatch, runner channel policy, and format
      # round-trips ship to `main` untested.
      - run: cargo test -p nokhwa --lib --tests --features input-v4l,runner
      # `nokhwa-bindings-windows-msmf` ships an off-Windows stub of
      # `MediaFoundationCaptureDevice` (lib.rs::stub) so cross-platform
      # `cargo check --features docs-only,docs-nolink` builds compile.
      # The stub's contract — `new()` errors, fallible methods return
      # `NotImplementedError`, `info()` / `negotiated_format()` panic
      # via `stub_unreachable()`, `is_open() == false` — is only
      # exercised when the crate is unit-tested on a non-Windows host.
      # Without this step the stub ships without any test coverage,
      # mirroring the V4L off-Linux gap that previously let `todo!()`
      # ship to `main`.
      - run: cargo test -p nokhwa-bindings-windows-msmf

  # Verifies output feature deps resolve correctly.
  # input-v4l satisfies the compile_error! guard that requires an input backend.
  check-features:
    name: Feature check (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - runner
          - output-wgpu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --features input-v4l,${{ matrix.features }}

  # Verifies the cross-platform GStreamer backend (session 1: enumeration
  # only) compiles on the canonical Linux path. gstreamer-rs links against
  # the system GStreamer install at build time.
  check-gstreamer:
    name: Feature check (input-gstreamer)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install GStreamer (cached)
        # ``libgstreamer1.0-dev`` ships the pkg-config files for the
        # core sys crate. ``libgstreamer-plugins-base1.0-dev`` supplies
        # ``gstreamer-app-1.0.pc`` + ``gstreamer-video-1.0.pc`` that
        # ``gstreamer-app-sys`` / ``gstreamer-video-sys`` need
        # (session-2 streaming). ``gstreamer1.0-plugins-base``
        # provides the ``videoconvert`` element our pipeline relies
        # on. Cached via ``cache-apt-pkgs-action`` so the ~30 MB
        # install doesn't run fresh on every PR.
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            libgstreamer1.0-dev
            libgstreamer-plugins-base1.0-dev
            gstreamer1.0-plugins-base
            pkg-config
          version: v1
      - uses: Swatinem/rust-cache@v2
      # Check `input-gstreamer` standalone — not paired with `input-v4l` —
      # so `-D warnings` only applies to the gstreamer crate and the
      # top-level crate. Pre-existing warnings in the v4l bindings crate
      # (e.g. an unused `Stream` import) are intentionally out of scope
      # for this job; they surface under the `check-features` matrix
      # which does not set `-D warnings`.
      - run: cargo check --features input-gstreamer
      - run: cargo test -p nokhwa-bindings-gstreamer --features backend
