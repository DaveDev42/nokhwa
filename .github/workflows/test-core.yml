name: Test Core & Features

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-core:
    name: Core unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p nokhwa-core

  # Verifies output feature deps resolve correctly.
  # input-v4l satisfies the compile_error! guard that requires an input backend.
  check-features:
    name: Feature check (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - runner
          - output-wgpu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --features input-v4l,${{ matrix.features }}

  # Verifies the cross-platform GStreamer backend (session 1: enumeration
  # only) compiles on the canonical Linux path. gstreamer-rs links against
  # the system GStreamer install at build time.
  check-gstreamer:
    name: Feature check (input-gstreamer)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install GStreamer
        # `libgstreamer1.0-dev` ships the pkg-config files for the core
        # sys crate. `libgstreamer-plugins-base1.0-dev` supplies the
        # `gstreamer-app-1.0.pc` + `gstreamer-video-1.0.pc` that
        # `gstreamer-app-sys` / `gstreamer-video-sys` need (session-2
        # streaming). `gstreamer1.0-plugins-base` provides the
        # `videoconvert` element our pipeline relies on. Skip Recommends
        # to avoid pulling in the
        # full plugin set.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            pkg-config
      - uses: Swatinem/rust-cache@v2
      # Check `input-gstreamer` standalone — not paired with `input-v4l` —
      # so `-D warnings` only applies to the gstreamer crate and the
      # top-level crate. Pre-existing warnings in the v4l bindings crate
      # (e.g. an unused `Stream` import) are intentionally out of scope
      # for this job; they surface under the `check-features` matrix
      # which does not set `-D warnings`.
      - run: cargo check --features input-gstreamer
      - run: cargo test -p nokhwa-bindings-gstreamer --features backend

  # Verifies the GStreamer backend also compiles on Windows. The
  # install is huge (~500 MB from gstreamer.freedesktop.org) so we
  # cache it aggressively — first cold run costs ~5 min, subsequent
  # PRs hit the cache and take <30 s. ``continue-on-error: true``
  # keeps a mirror-flake during install from blocking merges; the
  # separate ``Build (windows)`` job already exercises the top-level
  # crate with MSMF.
  check-gstreamer-windows:
    name: Feature check (input-gstreamer, windows)
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true
    env:
      RUSTFLAGS: "-D warnings"
      # Match the per-user install path the GStreamer MSVC installer
      # uses by default so the cache key stays stable across runs.
      GST_ROOT: C:\gstreamer\1.0\msvc_x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Cache GStreamer SDK
        id: cache-gstreamer-win
        uses: actions/cache@v4
        with:
          path: ${{ env.GST_ROOT }}
          # Bump the version segment if we need a newer SDK for a
          # specific plugin.
          key: gstreamer-msvc-1.26.0
      - name: Install GStreamer (MSVC)
        if: steps.cache-gstreamer-win.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # Use the official MSVC installer via choco. The
          # ``--params`` string flips on the dev install so we get
          # headers + ``.pc`` files for ``pkg-config``.
          choco install gstreamer -y --no-progress --version=1.26.0
          choco install gstreamer-devel -y --no-progress --version=1.26.0
      - name: Expose GStreamer to cargo
        shell: pwsh
        run: |
          $gstBin  = "${env:GST_ROOT}\bin"
          $gstPkg  = "${env:GST_ROOT}\lib\pkgconfig"
          Add-Content -Path $env:GITHUB_PATH -Value $gstBin
          Add-Content -Path $env:GITHUB_ENV  -Value "PKG_CONFIG_PATH=$gstPkg"
          Write-Output "GStreamer bin   : $gstBin"
          Write-Output "GStreamer pkgcfg: $gstPkg"
          if (-not (Test-Path "$gstBin\gst-launch-1.0.exe")) {
            Write-Error "GStreamer install did not produce gst-launch-1.0.exe — cache or installer broken"
            exit 1
          }
      - run: cargo check --features input-gstreamer
      - run: cargo test -p nokhwa-bindings-gstreamer --features backend
