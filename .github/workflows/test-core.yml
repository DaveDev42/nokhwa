name: Test Core & Features

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-core:
    name: Core unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p nokhwa-core

  # Verifies output feature deps resolve correctly.
  # input-v4l satisfies the compile_error! guard that requires an input backend.
  check-features:
    name: Feature check (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - runner
          - output-wgpu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --features input-v4l,${{ matrix.features }}

  # Verifies the cross-platform OpenCV backend still compiles. Installs
  # OpenCV from apt so the `opencv` crate's clang-runtime bindgen pass
  # can find the system headers.
  check-opencv:
    name: Feature check (input-opencv)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install OpenCV
        # Install only the OpenCV modules the `input-opencv` feature uses
        # (core + imgproc + videoio). The `libopencv-dev` metapackage
        # pulls ~2GB of ROCm/HIP/GStreamer transitive deps from slow
        # Azure mirrors and regularly times out; the per-module headers
        # are a few hundred MB and install in ~1 min.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libopencv-core-dev \
            libopencv-imgproc-dev \
            libopencv-videoio-dev \
            libclang-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --features input-opencv
